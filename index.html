<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>明晚是否跟我一起吃饭？</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'bounce-in': 'bounceIn 0.6s ease-out forwards',
            'fall': 'fall 5s linear infinite'
          },
          keyframes: {
            bounceIn: {
              '0%': { transform: 'scale(0)', opacity: '0' },
              '50%': { transform: 'scale(1.05)' },
              '100%': { transform: 'scale(1)', opacity: '1' }
            }
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body class="m-0 p-0">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    const { useState, useEffect } = React;

    // HeartRain 爱心雨组件
    const HeartRain = () => {
      const [hearts, setHearts] = useState([]);

      useEffect(() => {
        const createHeart = () => {
          const id = Math.random().toString(36).substr(2, 9);
          const left = Math.random() * 100;
          const duration = Math.random() * 2 + 3;
          const size = Math.random() * 20 + 10;
          return { id, left, duration, size };
        };

        const initialHearts = Array.from({ length: 20 }).map(createHeart);
        setHearts(initialHearts);

        const interval = setInterval(() => {
          setHearts(prev => {
            const newHeart = createHeart();
            const activeHearts = prev.length > 50 ? prev.slice(prev.length - 40) : prev;
            return [...activeHearts, newHeart];
          });
        }, 300);

        return () => clearInterval(interval);
      }, []);

      return (
        <div className="fixed inset-0 pointer-events-none overflow-hidden z-50">
          {hearts.map(heart => (
            <div
              key={heart.id}
              className="absolute text-red-500 opacity-80"
              style={{
                left: `${heart.left}%`,
                top: '-50px',
                fontSize: `${heart.size}px`,
                animation: `fall ${heart.duration}s linear infinite`,
              }}
            >
              <i className="fas fa-heart"></i>
            </div>
          ))}
        </div>
      );
    };

    // SuccessPage 成功页面
    const SuccessPage = () => {
      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-pink-50 p-6 relative overflow-hidden">
          <HeartRain />
          <div className="z-10 flex flex-col items-center animate-bounce-in">
            <h1 className="text-4xl md:text-6xl font-bold text-red-500 mb-8 text-center drop-shadow-md">
              太好了！不见不散~ <i className="fas fa-kiss-wink-heart text-pink-500"></i>
            </h1>
            <div className="w-full max-w-lg rounded-3xl overflow-hidden shadow-2xl border-4 border-pink-200 bg-white p-2">
              <img
                src="https://images.unsplash.com/photo-1490750967868-88aa4486c946?w=600&h=600&fit=crop"
                alt="美丽鲜花"
                className="w-full h-auto object-cover rounded-2xl"
              />
            </div>
            <div className="mt-8 text-xl text-gray-700 font-medium bg-white/80 px-6 py-3 rounded-full shadow-sm backdrop-blur-sm">
              记得准时哦！(｡♥‿♥｡)
            </div>
          </div>
        </div>
      );
    };

    // InvitePage 邀约页面
    const InvitePage = ({ onAgree }) => {
      const [noCount, setNoCount] = useState(0);

      const noTexts = [
        "不同意", "真的吗？", "再想想？", "不给机会？", "求你了...",
        "会后悔的！", "别这样嘛", "心碎了...", "气抖冷", "最后一次机会",
        "不要啊", "既然如此...", "那我走了", "骗你的", "回来吧", "好的吧..."
      ];

      const getNoText = () => noTexts[Math.min(noCount, noTexts.length - 1)];
      const yesButtonSize = noCount * 20 + 16;

      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-gradient-to-b from-pink-100 to-red-50 p-4 transition-all duration-500">
          <div className="w-full max-w-md flex flex-col items-center gap-6">
            <div className="w-full h-64 rounded-2xl overflow-hidden shadow-lg bg-white">
              <img
                src="https://images.unsplash.com/photo-1527529482837-4698179dc6ce?w=500&h=400&fit=crop"
                alt="浪漫约会"
                className="w-full h-full object-cover object-center"
              />
            </div>
            <h1 className="text-3xl md:text-4xl font-bold text-gray-800 text-center mt-4">
              明晚是否跟我一起吃饭？
              <i className="fas fa-utensils text-pink-400 ml-2"></i>
            </h1>
            <p className="text-gray-500 text-center">
              这里有美食，有故事，还有一个可爱的我~
            </p>
            <div className="flex flex-wrap items-center justify-center gap-4 mt-8 w-full min-h-[100px]">
              <button
                onClick={onAgree}
                className="bg-green-500 hover:bg-green-600 text-white font-bold rounded-full shadow-lg transition-all duration-300 transform hover:scale-105 flex items-center justify-center"
                style={{
                  fontSize: `${yesButtonSize}px`,
                  padding: `${yesButtonSize * 0.5}px ${yesButtonSize}px`,
                  maxWidth: '90vw',
                  zIndex: 10
                }}
              >
                同意 <i className="fas fa-check ml-2"></i>
              </button>
              <button
                onClick={() => setNoCount(noCount + 1)}
                className="bg-red-400 hover:bg-red-500 text-white font-bold py-3 px-8 rounded-full shadow-md transition-all duration-300 hover:bg-red-600 focus:outline-none"
                style={{
                  transform: `scale(${Math.max(0.7, 1 - noCount * 0.1)})`,
                  opacity: Math.max(0.3, 1 - noCount * 0.1)
                }}
              >
                {getNoText()}
              </button>
            </div>
          </div>
          <div className="mt-12 text-sm text-gray-400">
            (P.S. 其实你没有别的选择 😉)
          </div>
        </div>
      );
    };

    // App 主应用
    function App() {
      const [currentPage, setCurrentPage] = useState('invite');

      useEffect(() => {
        const handlePageChange = () => {
          const pageKey = document.querySelector('[data-page-key]')?.getAttribute('data-page-key');
          if (pageKey === 'index') setCurrentPage('invite');
          if (pageKey === 'success') setCurrentPage('success');
        };
        handlePageChange();
        const observer = new MutationObserver(handlePageChange);
        const root = document.querySelector('[data-page-key]');
        if (root) {
          observer.observe(root, { attributes: true, attributeFilter: ['data-page-key'] });
        }
        return () => observer.disconnect();
      }, []);

      const handleAgree = () => {
        setCurrentPage('success');
        const root = document.querySelector('[data-page-key]');
        if (root) root.setAttribute('data-page-key', 'success');
      };

      return (
        <div
          className="w-full min-h-screen bg-white font-sans"
          data-page-key={currentPage === 'invite' ? 'index' : 'success'}
        >
          {currentPage === 'invite' && <InvitePage onAgree={handleAgree} />}
          {currentPage === 'success' && <SuccessPage />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
